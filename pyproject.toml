[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(filename)s:%(lineno)s - %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
log_file = "t.log"
log_file_level = "INFO"
log_file_format = "%(asctime)s [%(levelname)s] %(filename)s:%(lineno)s - %(message)s"

filterwarnings = [
    "ignore:builtin type SwigPyPacked has no __module__:DeprecationWarning",
    "ignore:builtin type SwigPyObject has no __module__:DeprecationWarning",
]


asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

